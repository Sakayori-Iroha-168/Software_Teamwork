# Compose-oriented RAGFlow runtime configuration for the Knowledge replacement path.
# Metadata uses PostgreSQL knowledge_system (project-owned DB).

ragflow:
  host: 0.0.0.0
  http_port: 9380

postgres:
  name: knowledge_system
  user: knowledge_app
  password: knowledge_app_dev
  host: postgres
  port: 5432

# Legacy upstream default kept for reference only:
# mysql:
#   name: rag_flow
#   user: root
#   password: infini_rag_flow
#   host: mysql
#   port: 3306

minio:
  user: ${MINIO_ROOT_USER:-minio_local_demo}
  password: ${MINIO_ROOT_PASSWORD:-minio-local-demo-password}
  host: minio:9000
  bucket: software-teamwork-knowledge
  prefix_path: ragflow

es:
  hosts: http://elasticsearch:9200
  username: ''
  password: ''

redis:
  db: 1
  username: ''
  password: ''
  host: redis:6379

task_executor:
  message_queue_type: redis

user_default_llm:
  default_models:
    embedding_model:
      name: bge-m3
      factory: Builtin
      api_key: local
      base_url: http://127.0.0.1:6380
