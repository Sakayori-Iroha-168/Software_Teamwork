services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: qa_system
      POSTGRES_USER: qa_app
      POSTGRES_PASSWORD: qa_app_dev
      TZ: Asia/Shanghai
    ports:
      - "${QA_POSTGRES_PORT:-5433}:5432"
    volumes:
      - qa_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U qa_app -d qa_system"]
      interval: 3s
      timeout: 3s
      retries: 20

  migrate:
    build:
      context: .
      dockerfile: Dockerfile.migrate
    environment:
      GOOSE_DRIVER: postgres
      GOOSE_DBSTRING: postgres://qa_app:qa_app_dev@postgres:5432/qa_system?sslmode=disable
      GOOSE_MIGRATION_DIR: /migrations
    volumes:
      - ./migrations:/migrations:ro
    command: ["up"]
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

volumes:
  qa_pg_data:
