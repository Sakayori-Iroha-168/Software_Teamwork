openapi: 3.0.3
info:
  title: QA Service API
  version: 0.1.0
paths:
  /healthz:
    get:
      summary: Health check
      responses:
        "200":
          description: Service is healthy
  /api/chat/stream:
    post:
      summary: Stream a chat response through Server-Sent Events
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - message
                - conversation_id
              properties:
                conversation_id:
                  type: string
                message:
                  type: string
                knowledge_bases:
                  type: array
                  items:
                    type: string
                params:
                  type: object
                  properties:
                    top_k:
                      type: integer
                    similarity_threshold:
                      type: number
                    use_rerank:
                      type: boolean
                    rerank_threshold:
                      type: number
      responses:
        "200":
          description: SSE stream
          content:
            text/event-stream:
              schema:
                type: string
        "400":
          description: Invalid request
  /api/v1/qa-config-versions/current:
    get:
      summary: Get active QA configuration version
      responses:
        "200":
          description: Active QA configuration
  /api/v1/qa-config-versions:
    post:
      summary: Create a QA configuration version and optionally activate it
      responses:
        "201":
          description: Created QA configuration
  /api/v1/llm-config-versions/current:
    get:
      summary: Get active LLM configuration version
      responses:
        "200":
          description: Active LLM configuration with AI Gateway profileId
  /api/v1/llm-config-versions:
    post:
      summary: Create and activate an LLM configuration version by AI Gateway profileId
      responses:
        "201":
          description: Created LLM configuration without provider API key fields
  /api/v1/llm-connection-tests:
    post:
      summary: Test an LLM profile without saving or activating it
      responses:
        "200":
          description: Connection test result
