# Local development overlay for knowledge-runtime (PostgreSQL knowledge_system).
# For Docker/compose, entrypoint renders conf/service_conf.yaml.template instead.
# Quick start: cp conf/service_conf.compose.yaml conf/service_conf.yaml and edit hosts.

ragflow:
  host: 0.0.0.0
  http_port: 9380

postgres:
  name: knowledge_system
  user: knowledge_app
  password: knowledge_app_dev
  host: localhost
  port: 5432

minio:
  user: minio_local_demo
  password: minio-local-demo-password
  host: localhost:9000
  bucket: software-teamwork-knowledge
  prefix_path: ragflow

es:
  hosts: http://localhost:9200
  username: ''
  password: ''

redis:
  db: 1
  username: ''
  password: ''
  host: localhost:6379

task_executor:
  message_queue_type: redis

user_default_llm:
  default_models:
    embedding_model:
      name: bge-m3
      factory: Builtin
      api_key: local
      base_url: http://127.0.0.1:6380
