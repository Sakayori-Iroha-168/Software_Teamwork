services:
  postgres:
    image: ${POSTGRES_IMAGE:-postgres:16-alpine}
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-REPLACE_WITH_POSTGRES_ADMIN_PASSWORD}
      POSTGRES_DB: postgres
      AUTH_DB_PASSWORD: ${AUTH_DB_PASSWORD:-REPLACE_WITH_AUTH_DB_PASSWORD}
      FILE_DB_PASSWORD: ${FILE_DB_PASSWORD:-REPLACE_WITH_FILE_DB_PASSWORD}
      KNOWLEDGE_DB_PASSWORD: ${KNOWLEDGE_DB_PASSWORD:-REPLACE_WITH_KNOWLEDGE_DB_PASSWORD}
      QA_DB_PASSWORD: ${QA_DB_PASSWORD:-REPLACE_WITH_QA_DB_PASSWORD}
      DOCUMENT_DB_PASSWORD: ${DOCUMENT_DB_PASSWORD:-REPLACE_WITH_DOCUMENT_DB_PASSWORD}
      AI_GATEWAY_DB_PASSWORD: ${AI_GATEWAY_DB_PASSWORD:-REPLACE_WITH_AI_GATEWAY_DB_PASSWORD}
      TZ: Asia/Shanghai
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/init-production:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -h localhost -U postgres -d postgres"]
      interval: 5s
      timeout: 3s
      retries: 30

  redis:
    image: ${REDIS_IMAGE:-redis:7-alpine}
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 30

  qdrant:
    image: ${QDRANT_IMAGE:-qdrant/qdrant:v1.18.2}
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD-SHELL", "bash -ec '</dev/tcp/127.0.0.1/6333'"]
      interval: 5s
      timeout: 3s
      retries: 30

  minio:
    image: ${MINIO_IMAGE:-minio/minio:RELEASE.2025-09-07T16-13-09Z}
    command: ["server", "/data", "--console-address", ":9001"]
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-REPLACE_WITH_MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-REPLACE_WITH_MINIO_ROOT_PASSWORD}
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:9000/minio/health/live >/dev/null || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 30

  minio-init:
    image: ${MINIO_MC_IMAGE:-minio/mc:RELEASE.2025-08-13T08-35-41Z}
    depends_on:
      minio:
        condition: service_healthy
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-REPLACE_WITH_MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-REPLACE_WITH_MINIO_ROOT_PASSWORD}
      FILE_MINIO_BUCKET: ${FILE_MINIO_BUCKET:-software-teamwork-prod}
    entrypoint: ["/bin/sh"]
    command:
      - -ec
      - |
        mc alias set prod http://minio:9000 "$${MINIO_ROOT_USER}" "$${MINIO_ROOT_PASSWORD}"
        mc mb --ignore-existing "prod/$${FILE_MINIO_BUCKET}"
    restart: "no"

  migrate-auth:
    image: ${MIGRATE_IMAGE:-registry.example.com/software-teamwork/goose-migrate:REPLACE_WITH_TAG}
    command: ["-dir", "/migrations", "postgres", "postgres://auth_app:${AUTH_DB_PASSWORD:-REPLACE_WITH_AUTH_DB_PASSWORD}@postgres:5432/auth_system?sslmode=disable", "up"]
    volumes:
      - ../services/auth/migrations:/migrations:ro
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  migrate-file:
    image: ${MIGRATE_IMAGE:-registry.example.com/software-teamwork/goose-migrate:REPLACE_WITH_TAG}
    command: ["-dir", "/migrations", "postgres", "postgres://file_app:${FILE_DB_PASSWORD:-REPLACE_WITH_FILE_DB_PASSWORD}@postgres:5432/file_system?sslmode=disable", "up"]
    volumes:
      - ../services/file/migrations:/migrations:ro
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  migrate-knowledge:
    image: ${MIGRATE_IMAGE:-registry.example.com/software-teamwork/goose-migrate:REPLACE_WITH_TAG}
    command: ["-dir", "/migrations", "postgres", "postgres://knowledge_app:${KNOWLEDGE_DB_PASSWORD:-REPLACE_WITH_KNOWLEDGE_DB_PASSWORD}@postgres:5432/knowledge_system?sslmode=disable", "up"]
    volumes:
      - ../services/knowledge/migrations:/migrations:ro
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  migrate-qa:
    image: ${MIGRATE_IMAGE:-registry.example.com/software-teamwork/goose-migrate:REPLACE_WITH_TAG}
    command: ["-dir", "/migrations", "postgres", "postgres://qa_app:${QA_DB_PASSWORD:-REPLACE_WITH_QA_DB_PASSWORD}@postgres:5432/qa_system?sslmode=disable", "up"]
    volumes:
      - ../services/qa/migrations:/migrations:ro
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  migrate-document:
    image: ${MIGRATE_IMAGE:-registry.example.com/software-teamwork/goose-migrate:REPLACE_WITH_TAG}
    command: ["-dir", "/migrations", "postgres", "postgres://document_app:${DOCUMENT_DB_PASSWORD:-REPLACE_WITH_DOCUMENT_DB_PASSWORD}@postgres:5432/document_system?sslmode=disable", "up"]
    volumes:
      - ../services/document/migrations:/migrations:ro
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  migrate-ai-gateway:
    image: ${MIGRATE_IMAGE:-registry.example.com/software-teamwork/goose-migrate:REPLACE_WITH_TAG}
    command: ["-dir", "/migrations", "postgres", "postgres://ai_gateway_app:${AI_GATEWAY_DB_PASSWORD:-REPLACE_WITH_AI_GATEWAY_DB_PASSWORD}@postgres:5432/ai_gateway_system?sslmode=disable", "up"]
    volumes:
      - ../services/ai-gateway/migrations:/migrations:ro
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  auth:
    image: ${AUTH_IMAGE:-registry.example.com/software-teamwork/auth:REPLACE_WITH_TAG}
    environment:
      AUTH_HTTP_ADDR: :8001
      AUTH_ENV: ${AUTH_ENV:-production}
      AUTH_SERVICE_VERSION: ${AUTH_SERVICE_VERSION:-REPLACE_WITH_RELEASE_VERSION}
      AUTH_DATABASE_URL: postgres://auth_app:${AUTH_DB_PASSWORD:-REPLACE_WITH_AUTH_DB_PASSWORD}@postgres:5432/auth_system?sslmode=disable
      AUTH_INTERNAL_SERVICE_TOKEN: ${INTERNAL_SERVICE_TOKEN:-REPLACE_WITH_RANDOM_INTERNAL_SERVICE_TOKEN}
      AUTH_TOKEN_HASH_SECRET: ${TOKEN_HASH_SECRET:-REPLACE_WITH_RANDOM_TOKEN_HASH_SECRET}
      AUTH_TOKEN_HASH_KEY_VERSION: ${TOKEN_HASH_KEY_VERSION:-v1}
      AUTH_DEFAULT_ROLE_CODE: ${AUTH_DEFAULT_ROLE_CODE:-standard}
      AUTH_SESSION_TTL: ${AUTH_SESSION_TTL:-24h}
    depends_on:
      migrate-auth:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "-", "http://localhost:8001/readyz"]
      interval: 5s
      timeout: 3s
      retries: 30

  file:
    image: ${FILE_IMAGE:-registry.example.com/software-teamwork/file:REPLACE_WITH_TAG}
    environment:
      FILE_HTTP_ADDR: :8082
      FILE_DATABASE_URL: postgres://file_app:${FILE_DB_PASSWORD:-REPLACE_WITH_FILE_DB_PASSWORD}@postgres:5432/file_system?sslmode=disable
      FILE_INTERNAL_SERVICE_TOKEN: ${INTERNAL_SERVICE_TOKEN:-REPLACE_WITH_RANDOM_INTERNAL_SERVICE_TOKEN}
      FILE_STORAGE_BACKEND: ${FILE_STORAGE_BACKEND:-minio}
      FILE_MAX_UPLOAD_BYTES: ${FILE_MAX_UPLOAD_BYTES:-33554432}
      FILE_MINIO_ENDPOINT: minio:9000
      FILE_MINIO_ACCESS_KEY: ${MINIO_ROOT_USER:-REPLACE_WITH_MINIO_ROOT_USER}
      FILE_MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-REPLACE_WITH_MINIO_ROOT_PASSWORD}
      FILE_MINIO_BUCKET: ${FILE_MINIO_BUCKET:-software-teamwork-prod}
      FILE_MINIO_REGION: ${FILE_MINIO_REGION:-}
      FILE_MINIO_USE_SSL: ${FILE_MINIO_USE_SSL:-false}
      FILE_MINIO_TIMEOUT: ${FILE_MINIO_TIMEOUT:-10s}
    depends_on:
      migrate-file:
        condition: service_completed_successfully
      minio-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "-", "http://localhost:8082/readyz"]
      interval: 5s
      timeout: 3s
      retries: 30

  parser:
    image: ${PARSER_IMAGE:-registry.example.com/software-teamwork/parser:REPLACE_WITH_TAG}
    environment:
      PARSER_PORT: 8087
      PARSER_SERVICE_TOKEN: ${INTERNAL_SERVICE_TOKEN:-REPLACE_WITH_RANDOM_INTERNAL_SERVICE_TOKEN}
      PARSER_BACKEND: ${PARSER_BACKEND:-ppstructurev3}
      PARSER_PROFILE: ${PARSER_PROFILE:-accurate}
      PARSER_MAX_DOCUMENT_BYTES: ${PARSER_MAX_DOCUMENT_BYTES:-20971520}
      PARSER_MAX_CONCURRENCY: ${PARSER_MAX_CONCURRENCY:-1}
      PARSER_QUEUE_TIMEOUT_SECONDS: ${PARSER_QUEUE_TIMEOUT_SECONDS:-0}
      PARSER_PARSE_TIMEOUT_SECONDS: ${PARSER_PARSE_TIMEOUT_SECONDS:-120}
      PARSER_LOAD_BACKEND_ON_STARTUP: ${PARSER_LOAD_BACKEND_ON_STARTUP:-false}
      PARSER_SUBPROCESS_ISOLATION: ${PARSER_SUBPROCESS_ISOLATION:-true}
      PARSER_MEMORY_LIMIT_MB: ${PARSER_MEMORY_LIMIT_MB:-14500}
      PARSER_DEFAULT_DPI: ${PARSER_DEFAULT_DPI:-180}
      PARSER_RETRY_DPI: ${PARSER_RETRY_DPI:-220}
      PARSER_MAX_RETRY_DPI: ${PARSER_MAX_RETRY_DPI:-300}
      PADDLEOCR_LANG: ${PADDLEOCR_LANG:-ch}
      PADDLEOCR_DEVICE: ${PADDLEOCR_DEVICE:-cpu}
      PADDLEOCR_CONFIG_PATH: ${PADDLEOCR_CONFIG_PATH:-}
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8087/readyz', timeout=2).read()"]
      interval: 5s
      timeout: 3s
      retries: 30

  ai-gateway:
    image: ${AI_GATEWAY_IMAGE:-registry.example.com/software-teamwork/ai-gateway:REPLACE_WITH_TAG}
    environment:
      AI_GATEWAY_HTTP_ADDR: :8086
      AI_GATEWAY_DATABASE_URL: postgres://ai_gateway_app:${AI_GATEWAY_DB_PASSWORD:-REPLACE_WITH_AI_GATEWAY_DB_PASSWORD}@postgres:5432/ai_gateway_system?sslmode=disable
      AI_GATEWAY_SERVICE_TOKEN_HASHES: ${AI_GATEWAY_SERVICE_TOKEN_HASHES:-sha256:REPLACE_WITH_SHA256_OF_INTERNAL_SERVICE_TOKEN}
      AI_GATEWAY_SECRET_MODE: ${AI_GATEWAY_SECRET_MODE:-encrypted_column}
      AI_GATEWAY_CREDENTIAL_ENCRYPTION_KEY_REF: ${AI_GATEWAY_CREDENTIAL_ENCRYPTION_KEY_REF:-REPLACE_WITH_KEY_REF}
      AI_GATEWAY_CREDENTIAL_ENCRYPTION_KEY: ${AI_GATEWAY_CREDENTIAL_ENCRYPTION_KEY:-REPLACE_WITH_LONG_RANDOM_ENCRYPTION_KEY}
      AI_GATEWAY_DEFAULT_TIMEOUT_MS: ${AI_GATEWAY_DEFAULT_TIMEOUT_MS:-60000}
      AI_GATEWAY_MAX_REQUEST_BYTES: ${AI_GATEWAY_MAX_REQUEST_BYTES:-1048576}
    depends_on:
      migrate-ai-gateway:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "-", "http://localhost:8086/readyz"]
      interval: 5s
      timeout: 3s
      retries: 30

  knowledge:
    image: ${KNOWLEDGE_IMAGE:-registry.example.com/software-teamwork/knowledge:REPLACE_WITH_TAG}
    environment:
      KNOWLEDGE_HTTP_ADDR: :8083
      KNOWLEDGE_ENV: ${KNOWLEDGE_ENV:-production}
      KNOWLEDGE_SERVICE_VERSION: ${KNOWLEDGE_SERVICE_VERSION:-REPLACE_WITH_RELEASE_VERSION}
      DATABASE_URL: postgres://knowledge_app:${KNOWLEDGE_DB_PASSWORD:-REPLACE_WITH_KNOWLEDGE_DB_PASSWORD}@postgres:5432/knowledge_system?sslmode=disable
      FILE_SERVICE_BASE_URL: http://file:8082
      PARSER_SERVICE_BASE_URL: http://parser:8087
      PARSER_SERVICE_TOKEN: ${INTERNAL_SERVICE_TOKEN:-REPLACE_WITH_RANDOM_INTERNAL_SERVICE_TOKEN}
      KNOWLEDGE_REDIS_ADDR: redis:6379
      KNOWLEDGE_SERVICE_TOKEN: ${INTERNAL_SERVICE_TOKEN:-REPLACE_WITH_RANDOM_INTERNAL_SERVICE_TOKEN}
      KNOWLEDGE_MAX_UPLOAD_BYTES: ${KNOWLEDGE_MAX_UPLOAD_BYTES:-33554432}
      EMBEDDING_PROVIDER: ${EMBEDDING_PROVIDER:-local_hashing}
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-local_hashing}
      EMBEDDING_DIMENSION: ${EMBEDDING_DIMENSION:-384}
      QDRANT_URL: http://qdrant:6333
      QDRANT_API_KEY: ${QDRANT_API_KEY:-}
      QDRANT_COLLECTION: ${QDRANT_COLLECTION:-knowledge_chunks}
      AI_GATEWAY_BASE_URL: http://ai-gateway:8086
      AI_GATEWAY_SERVICE_TOKEN: ${INTERNAL_SERVICE_TOKEN:-REPLACE_WITH_RANDOM_INTERNAL_SERVICE_TOKEN}
      AI_GATEWAY_EMBEDDING_PROFILE_ID: ${AI_GATEWAY_EMBEDDING_PROFILE_ID:-}
      RERANK_MODEL: ${RERANK_MODEL:-}
      RERANK_PROFILE_ID: ${RERANK_PROFILE_ID:-}
    depends_on:
      migrate-knowledge:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
      qdrant:
        condition: service_healthy
      file:
        condition: service_healthy
      parser:
        condition: service_healthy
      ai-gateway:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "-", "http://localhost:8083/readyz"]
      interval: 5s
      timeout: 3s
      retries: 30

  qa:
    image: ${QA_IMAGE:-registry.example.com/software-teamwork/qa:REPLACE_WITH_TAG}
    environment:
      QA_HTTP_ADDR: :8084
      QA_DATABASE_URL: postgres://qa_app:${QA_DB_PASSWORD:-REPLACE_WITH_QA_DB_PASSWORD}@postgres:5432/qa_system?sslmode=disable
      QA_CONFIG_ENCRYPTION_KEY: ${QA_CONFIG_ENCRYPTION_KEY:-REPLACE_WITH_64_HEX_CHARACTER_KEY}
      INTERNAL_SERVICE_TOKEN: ${INTERNAL_SERVICE_TOKEN:-REPLACE_WITH_RANDOM_INTERNAL_SERVICE_TOKEN}
      KNOWLEDGE_SERVICE_URL: http://knowledge:8083
      FILE_SERVICE_BASE_URL: http://file:8082
      PARSER_SERVICE_BASE_URL: http://parser:8087
      PARSER_SERVICE_TOKEN: ${INTERNAL_SERVICE_TOKEN:-REPLACE_WITH_RANDOM_INTERNAL_SERVICE_TOKEN}
      AI_GATEWAY_URL: http://ai-gateway:8086/internal/v1/chat/completions
      AI_GATEWAY_TOKEN: ${INTERNAL_SERVICE_TOKEN:-REPLACE_WITH_RANDOM_INTERNAL_SERVICE_TOKEN}
      AI_GATEWAY_TOKEN_HEADER: X-Service-Token
      AI_GATEWAY_PROFILE_ID: ${AI_GATEWAY_PROFILE_ID:-REPLACE_WITH_CHAT_PROFILE_ID}
      MODEL_ID: ${MODEL_ID:-REPLACE_WITH_CHAT_PROFILE_MODEL}
      AI_GATEWAY_TIMEOUT: ${AI_GATEWAY_TIMEOUT:-60s}
      AI_GATEWAY_STREAM: ${AI_GATEWAY_STREAM:-false}
      QA_SETTINGS_OPEN: ${QA_SETTINGS_OPEN:-false}
      QA_ADMIN_USER_IDS: ${QA_ADMIN_USER_IDS:-}
      MCP_TRANSPORT: ${MCP_TRANSPORT:-disabled}
      AGENT_WORKDIR: ${AGENT_WORKDIR:-/workspace}
      AGENT_MAX_TOKENS: ${AGENT_MAX_TOKENS:-4096}
      AGENT_MAX_ITERATIONS: ${AGENT_MAX_ITERATIONS:-8}
      MCP_MAX_RESULT_BYTES: ${MCP_MAX_RESULT_BYTES:-50000}
      AGENT_ENABLE_COMMAND_TOOL: ${AGENT_ENABLE_COMMAND_TOOL:-false}
      QA_SESSION_ATTACHMENT_TTL_HOURS: ${QA_SESSION_ATTACHMENT_TTL_HOURS:-24}
      QA_SESSION_ATTACHMENT_MAX_BYTES: ${QA_SESSION_ATTACHMENT_MAX_BYTES:-20971520}
      QA_SESSION_ATTACHMENT_MAX_PER_SESSION: ${QA_SESSION_ATTACHMENT_MAX_PER_SESSION:-10}
      QA_SESSION_ATTACHMENT_PROCESS_TIMEOUT_SECONDS: ${QA_SESSION_ATTACHMENT_PROCESS_TIMEOUT_SECONDS:-60}
    volumes:
      - qa_workspace:/workspace
    depends_on:
      migrate-qa:
        condition: service_completed_successfully
      knowledge:
        condition: service_healthy
      file:
        condition: service_healthy
      parser:
        condition: service_healthy
      ai-gateway:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "-", "http://localhost:8084/readyz"]
      interval: 5s
      timeout: 3s
      retries: 30

  document:
    image: ${DOCUMENT_IMAGE:-registry.example.com/software-teamwork/document:REPLACE_WITH_TAG}
    environment:
      DOCUMENT_HTTP_ADDR: :8085
      DOCUMENT_DATABASE_URL: postgres://document_app:${DOCUMENT_DB_PASSWORD:-REPLACE_WITH_DOCUMENT_DB_PASSWORD}@postgres:5432/document_system?sslmode=disable
      DOCUMENT_REDIS_ADDR: redis:6379
      DOCUMENT_FILE_SERVICE_URL: http://file:8082
      DOCUMENT_FILE_SERVICE_TOKEN: ${INTERNAL_SERVICE_TOKEN:-REPLACE_WITH_RANDOM_INTERNAL_SERVICE_TOKEN}
      DOCUMENT_AI_GATEWAY_URL: http://ai-gateway:8086
      DOCUMENT_AI_GATEWAY_PROFILE_ID: ${DOCUMENT_AI_GATEWAY_PROFILE_ID:-REPLACE_WITH_CHAT_PROFILE_ID}
      DOCUMENT_AI_GATEWAY_SERVICE_TOKEN: ${INTERNAL_SERVICE_TOKEN:-REPLACE_WITH_RANDOM_INTERNAL_SERVICE_TOKEN}
      DOCUMENT_KNOWLEDGE_SERVICE_URL: http://knowledge:8083
      DOCUMENT_KNOWLEDGE_SERVICE_TOKEN: ${INTERNAL_SERVICE_TOKEN:-REPLACE_WITH_RANDOM_INTERNAL_SERVICE_TOKEN}
      DOCUMENT_PANDOC_PATH: ${DOCUMENT_PANDOC_PATH:-pandoc}
      DOCUMENT_LIBREOFFICE_PATH: ${DOCUMENT_LIBREOFFICE_PATH:-soffice}
    depends_on:
      migrate-document:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
      file:
        condition: service_healthy
      knowledge:
        condition: service_healthy
      ai-gateway:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "-", "http://localhost:8085/readyz"]
      interval: 5s
      timeout: 3s
      retries: 30

  gateway:
    image: ${GATEWAY_IMAGE:-registry.example.com/software-teamwork/gateway:REPLACE_WITH_TAG}
    environment:
      GATEWAY_HTTP_ADDR: :8080
      GATEWAY_ENV: ${GATEWAY_ENV:-production}
      GATEWAY_SERVICE_VERSION: ${GATEWAY_SERVICE_VERSION:-REPLACE_WITH_RELEASE_VERSION}
      GATEWAY_CORS_ALLOWED_ORIGINS: ${GATEWAY_CORS_ALLOWED_ORIGINS:-https://example.invalid}
      GATEWAY_CORS_ALLOWED_METHODS: GET,POST,PATCH,DELETE,OPTIONS
      GATEWAY_CORS_ALLOWED_HEADERS: Authorization,Content-Type,X-Request-Id
      GATEWAY_CORS_ALLOW_CREDENTIALS: "false"
      GATEWAY_REDIS_ADDR: redis:6379
      GATEWAY_REDIS_DB: ${GATEWAY_REDIS_DB:-0}
      GATEWAY_TOKEN_HASH_SECRET: ${TOKEN_HASH_SECRET:-REPLACE_WITH_RANDOM_TOKEN_HASH_SECRET}
      GATEWAY_TOKEN_HASH_KEY_VERSION: ${TOKEN_HASH_KEY_VERSION:-v1}
      GATEWAY_INTERNAL_SERVICE_TOKEN: ${INTERNAL_SERVICE_TOKEN:-REPLACE_WITH_RANDOM_INTERNAL_SERVICE_TOKEN}
      GATEWAY_AUTH_BASE_URL: http://auth:8001
      GATEWAY_KNOWLEDGE_BASE_URL: http://knowledge:8083
      GATEWAY_QA_BASE_URL: http://qa:8084
      GATEWAY_DOCUMENT_BASE_URL: http://document:8085
      GATEWAY_AI_GATEWAY_BASE_URL: http://ai-gateway:8086
      GATEWAY_REQUEST_TIMEOUT: ${GATEWAY_REQUEST_TIMEOUT:-30s}
      GATEWAY_DOWNSTREAM_TIMEOUT: ${GATEWAY_DOWNSTREAM_TIMEOUT:-10s}
      GATEWAY_MAX_BODY_BYTES: ${GATEWAY_MAX_BODY_BYTES:-10485760}
    ports:
      - "${GATEWAY_HTTP_PORT:-8080}:8080"
    depends_on:
      auth:
        condition: service_healthy
      knowledge:
        condition: service_healthy
      qa:
        condition: service_healthy
      document:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "-", "http://localhost:8080/readyz"]
      interval: 5s
      timeout: 3s
      retries: 30

  frontend:
    image: ${FRONTEND_IMAGE:-registry.example.com/software-teamwork/frontend:REPLACE_WITH_TAG}
    environment:
      VITE_API_BASE_URL: /api/v1
      GATEWAY_PUBLIC_ORIGIN: ${GATEWAY_PUBLIC_ORIGIN:-https://example.invalid}
    ports:
      - "${FRONTEND_HTTP_PORT:-80}:80"
    depends_on:
      gateway:
        condition: service_healthy

volumes:
  postgres_data:
  redis_data:
  qdrant_data:
  minio_data:
  qa_workspace:
