name: software-teamwork-local

x-postgres-env: &postgres-env
  POSTGRES_USER: postgres
  POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-local_dev_postgres_password}
  POSTGRES_DB: postgres
  TZ: Asia/Shanghai

x-goose-image: &goose-image
  build:
    context: .
    dockerfile: Dockerfile.migrate

x-health-http: &health-http
  interval: 5s
  timeout: 3s
  retries: 30
  start_period: 10s

services:
  postgres:
    image: postgres:16-alpine
    environment: *postgres-env
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d postgres"]
      interval: 3s
      timeout: 3s
      retries: 30

  redis:
    image: redis:7-alpine
    ports:
      - "${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 3s
      timeout: 3s
      retries: 30

  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "${QDRANT_HTTP_PORT:-6333}:6333"
      - "${QDRANT_GRPC_PORT:-6334}:6334"
    volumes:
      - qdrant_data:/qdrant/storage

  minio:
    image: minio/minio:latest
    command: ["server", "/data", "--console-address", ":9001"]
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-localminio}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-local-minio-password-change-me}
    ports:
      - "${MINIO_API_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - minio_data:/data

  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_started
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-localminio}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-local-minio-password-change-me}
      MINIO_BUCKET_FILES: ${MINIO_BUCKET_FILES:-local-files}
      MINIO_BUCKET_DOCUMENTS: ${MINIO_BUCKET_DOCUMENTS:-local-documents}
    entrypoint:
      - /bin/sh
      - -c
      - |
        until mc alias set local http://minio:9000 "$$MINIO_ROOT_USER" "$$MINIO_ROOT_PASSWORD"; do sleep 2; done
        mc mb --ignore-existing "local/$$MINIO_BUCKET_FILES"
        mc mb --ignore-existing "local/$$MINIO_BUCKET_DOCUMENTS"

  migrate-auth:
    <<: *goose-image
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ../services/auth/migrations:/migrations:ro
    command:
      - -dir
      - /migrations
      - postgres
      - postgres://auth_app:auth_app_dev@postgres:5432/auth_system?sslmode=disable
      - up
    restart: "no"

  migrate-file:
    <<: *goose-image
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ../services/file/migrations:/migrations:ro
    command:
      - -dir
      - /migrations
      - postgres
      - postgres://file_app:file_app_dev@postgres:5432/file_system?sslmode=disable
      - up
    restart: "no"

  migrate-knowledge:
    <<: *goose-image
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ../services/knowledge/migrations:/migrations:ro
    command:
      - -dir
      - /migrations
      - postgres
      - postgres://knowledge_app:knowledge_app_dev@postgres:5432/knowledge_system?sslmode=disable
      - up
    restart: "no"

  migrate-qa:
    <<: *goose-image
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ../services/qa/migrations:/migrations:ro
    command:
      - -dir
      - /migrations
      - postgres
      - postgres://qa_app:qa_app_dev@postgres:5432/qa_system?sslmode=disable
      - up
    restart: "no"

  migrate-document:
    <<: *goose-image
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ../services/document/migrations:/migrations:ro
    command:
      - -dir
      - /migrations
      - postgres
      - postgres://document_app:document_app_dev@postgres:5432/document_system?sslmode=disable
      - up
    restart: "no"

  migrate-ai-gateway:
    <<: *goose-image
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ../services/ai-gateway/migrations:/migrations:ro
    command:
      - -dir
      - /migrations
      - postgres
      - postgres://ai_gateway_app:ai_gateway_app_dev@postgres:5432/ai_gateway_system?sslmode=disable
      - up
    restart: "no"

  seed-demo:
    image: postgres:16-alpine
    depends_on:
      migrate-auth:
        condition: service_completed_successfully
      migrate-knowledge:
        condition: service_completed_successfully
      migrate-document:
        condition: service_completed_successfully
      migrate-ai-gateway:
        condition: service_completed_successfully
    environment:
      PGPASSWORD: ${POSTGRES_PASSWORD:-local_dev_postgres_password}
    volumes:
      - ./seed:/seed:ro
    command:
      - psql
      - -h
      - postgres
      - -U
      - postgres
      - -d
      - postgres
      - -v
      - ON_ERROR_STOP=1
      - -f
      - /seed/demo_seed.sql
    restart: "no"

  auth:
    build:
      context: ../services/auth
    environment:
      AUTH_HTTP_ADDR: :8001
      AUTH_DATABASE_URL: postgres://auth_app:auth_app_dev@postgres:5432/auth_system?sslmode=disable
      AUTH_INTERNAL_SERVICE_TOKEN: ${INTERNAL_SERVICE_TOKEN:-local-dev-service-token-change-me}
      AUTH_TOKEN_HASH_SECRET: ${AUTH_TOKEN_HASH_SECRET:-local-auth-token-hash-secret-change-me}
      AUTH_SESSION_TTL: ${AUTH_SESSION_TTL:-24h}
    ports:
      - "${AUTH_HTTP_PORT:-8001}:8001"
    depends_on:
      migrate-auth:
        condition: service_completed_successfully
    healthcheck:
      <<: *health-http
      test: ["CMD", "wget", "-q", "-O", "-", "http://localhost:8001/readyz"]

  file:
    build:
      context: ../services/file
    environment:
      FILE_HTTP_ADDR: :8082
      FILE_STORAGE_BACKEND: ${FILE_STORAGE_BACKEND:-local}
      FILE_LOCAL_STORAGE_DIR: ${FILE_LOCAL_STORAGE_DIR:-/data/file-storage}
    ports:
      - "${FILE_HTTP_PORT:-8082}:8082"
    volumes:
      - file_storage:/data/file-storage
    depends_on:
      migrate-file:
        condition: service_completed_successfully
      minio-init:
        condition: service_completed_successfully
    healthcheck:
      <<: *health-http
      test: ["CMD", "wget", "-q", "-O", "-", "http://localhost:8082/readyz"]

  knowledge:
    build:
      context: ../services/knowledge
    environment:
      KNOWLEDGE_HTTP_ADDR: :8083
      KNOWLEDGE_SERVICE_VERSION: ${KNOWLEDGE_SERVICE_VERSION:-local-demo}
      DATABASE_URL: postgres://knowledge_app:knowledge_app_dev@postgres:5432/knowledge_system?sslmode=disable
      FILE_SERVICE_BASE_URL: http://file:8082
      KNOWLEDGE_REDIS_ADDR: redis:6379
      KNOWLEDGE_SERVICE_TOKEN: ${INTERNAL_SERVICE_TOKEN:-local-dev-service-token-change-me}
    ports:
      - "${KNOWLEDGE_HTTP_PORT:-8083}:8083"
    depends_on:
      file:
        condition: service_healthy
      migrate-knowledge:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    healthcheck:
      <<: *health-http
      test: ["CMD", "wget", "-q", "-O", "-", "http://localhost:8083/readyz"]

  ai-gateway:
    build:
      context: ../services/ai-gateway
    environment:
      AI_GATEWAY_HTTP_ADDR: :8086
      AI_GATEWAY_DATABASE_URL: postgres://ai_gateway_app:ai_gateway_app_dev@postgres:5432/ai_gateway_system?sslmode=disable
      AI_GATEWAY_SERVICE_TOKEN_HASHES: sha256:${INTERNAL_SERVICE_TOKEN_SHA256:-1340e74cf9bef3aa359c458562f8fe87f4e549aecf98b7bba464560cd2b9fbc5}
      AI_GATEWAY_CREDENTIAL_ENCRYPTION_KEY_REF: ${AI_GATEWAY_CREDENTIAL_ENCRYPTION_KEY_REF:-local-demo-key-v1}
      AI_GATEWAY_CREDENTIAL_ENCRYPTION_KEY: ${AI_GATEWAY_CREDENTIAL_ENCRYPTION_KEY:-local-demo-credential-encryption-key-change-me}
    ports:
      - "${AI_GATEWAY_HTTP_PORT:-8086}:8086"
    depends_on:
      migrate-ai-gateway:
        condition: service_completed_successfully
      seed-demo:
        condition: service_completed_successfully
    healthcheck:
      <<: *health-http
      test: ["CMD", "wget", "-q", "-O", "-", "http://localhost:8086/healthz"]

  qa:
    build:
      context: ../services/qa
    environment:
      QA_HTTP_ADDR: :8084
      QA_DATABASE_URL: postgres://qa_app:qa_app_dev@postgres:5432/qa_system?sslmode=disable
      QA_CONFIG_ENCRYPTION_KEY: ${QA_CONFIG_ENCRYPTION_KEY:-000102030405060708090a0b0c0d0e0f101112131415161718191a1b1c1d1e1f}
      QA_SETTINGS_OPEN: ${QA_SETTINGS_OPEN:-false}
      KNOWLEDGE_SERVICE_URL: http://knowledge:8083
      AI_GATEWAY_URL: http://ai-gateway:8086/internal/v1/chat/completions
      AI_GATEWAY_TOKEN: ${INTERNAL_SERVICE_TOKEN:-local-dev-service-token-change-me}
      AI_GATEWAY_TOKEN_HEADER: X-Service-Token
      MODEL_ID: default-chat
      INTERNAL_SERVICE_TOKEN: ${INTERNAL_SERVICE_TOKEN:-local-dev-service-token-change-me}
      MCP_TRANSPORT: ${MCP_TRANSPORT:-disabled}
      AGENT_WORKDIR: ${AGENT_WORKDIR:-/workspace}
      AGENT_ENABLE_COMMAND_TOOL: ${AGENT_ENABLE_COMMAND_TOOL:-false}
    ports:
      - "${QA_HTTP_PORT:-8084}:8084"
    volumes:
      - qa_workspace:/workspace
    depends_on:
      knowledge:
        condition: service_healthy
      ai-gateway:
        condition: service_healthy
      migrate-qa:
        condition: service_completed_successfully
    healthcheck:
      <<: *health-http
      test: ["CMD", "wget", "-q", "-O", "-", "http://localhost:8084/readyz"]

  document:
    build:
      context: ../services/document
    environment:
      DOCUMENT_HTTP_ADDR: :8085
      DOCUMENT_DATABASE_URL: postgres://document_app:document_app_dev@postgres:5432/document_system?sslmode=disable
      DOCUMENT_REDIS_ADDR: redis:6379
      DOCUMENT_FILE_SERVICE_URL: http://file:8082
      DOCUMENT_AI_GATEWAY_URL: http://ai-gateway:8086
      DOCUMENT_AI_GATEWAY_PROFILE_ID: ${DOCUMENT_AI_GATEWAY_PROFILE_ID:-default-chat}
      DOCUMENT_PANDOC_PATH: pandoc
      DOCUMENT_LIBREOFFICE_PATH: soffice
    ports:
      - "${DOCUMENT_HTTP_PORT:-8085}:8085"
    depends_on:
      file:
        condition: service_healthy
      ai-gateway:
        condition: service_healthy
      migrate-document:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    healthcheck:
      <<: *health-http
      test: ["CMD", "wget", "-q", "-O", "-", "http://localhost:8085/readyz"]

  gateway:
    build:
      context: ../services/gateway
    environment:
      GATEWAY_HTTP_ADDR: :8080
      GATEWAY_AUTH_BASE_URL: http://auth:8001
      GATEWAY_KNOWLEDGE_BASE_URL: http://knowledge:8083
      GATEWAY_QA_BASE_URL: http://qa:8084
      GATEWAY_DOCUMENT_BASE_URL: http://document:8085
      GATEWAY_AI_GATEWAY_BASE_URL: http://ai-gateway:8086
      GATEWAY_REDIS_ADDR: redis:6379
      GATEWAY_TOKEN_HASH_SECRET: ${GATEWAY_TOKEN_HASH_SECRET:-local-gateway-token-hash-secret-change-me}
      GATEWAY_INTERNAL_SERVICE_TOKEN: ${INTERNAL_SERVICE_TOKEN:-local-dev-service-token-change-me}
      GATEWAY_CORS_ALLOWED_ORIGINS: ${GATEWAY_CORS_ALLOWED_ORIGINS:-http://localhost:5173}
    ports:
      - "${GATEWAY_HTTP_PORT:-8080}:8080"
    depends_on:
      auth:
        condition: service_healthy
      knowledge:
        condition: service_healthy
      qa:
        condition: service_healthy
      document:
        condition: service_healthy
      ai-gateway:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      <<: *health-http
      test: ["CMD", "wget", "-q", "-O", "-", "http://localhost:8080/readyz"]

volumes:
  postgres_data:
  qdrant_data:
  minio_data:
  file_storage:
  qa_workspace:
