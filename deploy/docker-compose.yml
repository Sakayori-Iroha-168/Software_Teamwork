services:
  postgres:
    image: postgres:16-alpine
    container_name: qa-system-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: qa_app
      POSTGRES_PASSWORD: qa_app_dev
      POSTGRES_DB: qa_system
      TZ: Asia/Shanghai
    ports:
      - "5432:5432"
    volumes:
      - qa_pg_data:/var/lib/postgresql/data
      - ../docs/qa-system-design/db/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U qa_app -d qa_system"]
      interval: 5s
      timeout: 3s
      retries: 10

  qa:
    build:
      context: ..
      dockerfile: services/qa/Dockerfile
    environment:
      QA_PORT: "8080"
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  qa_pg_data:
