name: Go Services

on:
  pull_request:
    branches: [develop]
    paths:
      - 'services/**'
      - '.github/workflows/go-services.yml'
  push:
    branches: [develop]
    paths:
      - 'services/**'
      - '.github/workflows/go-services.yml'

permissions:
  contents: read

jobs:
  service:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service: [ai-gateway, auth, document, file, gateway, knowledge, qa]
    defaults:
      run:
        working-directory: services/${{ matrix.service }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25.x'
          cache-dependency-path: services/${{ matrix.service }}/go.mod

      - name: Test
        run: go test ./...

      - name: Build server
        run: go build ./cmd/server

      - name: Build QA agent
        if: matrix.service == 'qa'
        run: go build ./cmd/agent
