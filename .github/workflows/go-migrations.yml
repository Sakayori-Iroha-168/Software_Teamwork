name: Go Migrations

on:
  pull_request:
    branches: [develop]
    paths:
      - 'services/*/migrations/**'
      - '.github/workflows/go-migrations.yml'
  push:
    branches: [develop]
    paths:
      - 'services/*/migrations/**'
      - '.github/workflows/go-migrations.yml'

permissions:
  contents: read

jobs:
  migrations:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service: [ai-gateway, auth, document, knowledge]
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: app
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d app"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgres://postgres:postgres@localhost:5432/app?sslmode=disable
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25.x'

      - name: Install goose
        run: go install github.com/pressly/goose/v3/cmd/goose@v3.27.1

      - name: Apply migrations
        run: goose -dir "services/${{ matrix.service }}/migrations" postgres "$DATABASE_URL" up
