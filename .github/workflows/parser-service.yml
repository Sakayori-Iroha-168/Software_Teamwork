name: Parser Service

on:
  pull_request:
    branches: [develop]
    paths:
      - 'services/parser/**'
      - '.github/workflows/parser-service.yml'
  push:
    branches: [develop]
    paths:
      - 'services/parser/**'
      - '.github/workflows/parser-service.yml'

permissions:
  contents: read
  pull-requests: read

jobs:
  python:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/parser
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Detect PaddleOCR dependency changes
        id: paddleocr
        uses: actions/github-script@v7
        with:
          script: |
            const watched = new Set([
              'services/parser/pyproject.toml',
              'services/parser/uv.lock',
              'services/parser/Dockerfile',
            ]);

            let files = [];
            if (context.eventName === 'pull_request') {
              files = await github.paginate(github.rest.pulls.listFiles, {
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: context.payload.pull_request.number,
                per_page: 100,
              });
            } else if (context.eventName === 'push') {
              try {
                const comparison = await github.rest.repos.compareCommits({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  base: context.payload.before,
                  head: context.sha,
                });
                files = comparison.data.files ?? [];
              } catch (error) {
                core.warning(`Could not compare commits for PaddleOCR dependency detection: ${error.message}`);
                core.setOutput('run_paddleocr', 'true');
                return;
              }
            }

            const run = files.some((file) => watched.has(file.filename));
            core.setOutput('run_paddleocr', run ? 'true' : 'false');

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install uv
        run: python -m pip install uv==0.11.6

      - name: Install dependencies
        run: uv sync --frozen --group dev

      - name: Verify PaddleOCR runtime dependency lock
        if: steps.paddleocr.outputs.run_paddleocr == 'true'
        run: uv sync --frozen --no-dev --extra paddleocr --no-install-project --dry-run

      - name: Lint
        run: uv run ruff check .

      - name: Test
        run: uv run pytest

      - name: Compile
        run: uv run python -m compileall src tests
